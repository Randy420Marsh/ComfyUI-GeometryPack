# Linux-specific conda packages (OpenGL stack for headless rendering)
[target.linux-64.dependencies]
mesalib = "*"
libglu = "*"
libopengl = "*"
xorg-libxi = "*"
libxkbcommon = "*"

# Linux-specific pypi packages
[target.linux-64.pypi-dependencies]
embreex = "*"

# Windows-specific packages
[target.win-64.pypi-dependencies]
msvc-runtime = "*"
embreex = "*"
