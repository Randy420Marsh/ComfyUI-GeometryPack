name: Workflow Tests
on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test (empty = all)'
        type: choice
        options:
          - ''
          - linux-cpu
          - macos-cpu
          - windows-cpu
          - windows-portable-cpu
        default: ''

jobs:
  test:
    uses: PozzettiAndrea/comfy-test/.github/workflows/test-matrix.yml@v0.2.38
    with:
      config-file: "comfy-test.toml"
      platform: ${{ inputs.platform || '' }}
